<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0d0505"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4421a"/>
      <stop offset="100%" stop-color="#8b2010"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="50%" stop-color="#999"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
  </defs>

  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <g transform="translate(96, 86) rotate(-35)">
    <!-- Bar -->
    <rect x="-46" y="-3" width="92" height="6" rx="3" fill="url(#bar)"/>
    <!-- Left plates -->
    <rect x="-56" y="-18" width="12" height="36" rx="3" fill="url(#red)"/>
    <rect x="-45" y="-14" width="9" height="28" rx="2" fill="url(#red)" opacity="0.85"/>
    <!-- Right plates -->
    <rect x="44" y="-18" width="12" height="36" rx="3" fill="url(#red)"/>
    <rect x="36" y="-14" width="9" height="28" rx="2" fill="url(#red)" opacity="0.85"/>
    <!-- Collars -->
    <rect x="-35" y="-5" width="5" height="10" rx="1.5" fill="#aaa"/>
    <rect x="30" y="-5" width="5" height="10" rx="1.5" fill="#aaa"/>
  </g>

  <text x="96" y="152" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-0.3">MEAL PLAN</text>
  <rect x="60" y="159" width="72" height="2" rx="1" fill="#c4421a" opacity="0.6"/>
</svg>
